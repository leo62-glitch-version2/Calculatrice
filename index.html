<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Calc Pro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080c14;
  --surface:#0d1320;
  --surface2:#111827;
  --surface3:#1a2235;
  --border:rgba(255,255,255,0.08);
  --red:#e94560;
  --orange:#f5a623;
  --blue:#3b82f6;
  --green:#10b981;
  --purple:#8b5cf6;
  --cyan:#06b6d4;
  --text:#f0f4ff;
  --muted:rgba(240,244,255,0.4);
  --muted2:rgba(240,244,255,0.15);
  --nav-h:64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html,body{
  height:100%;
  height:100dvh;
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  overflow:hidden;
  position:fixed;
  width:100%;
}

/* APP SHELL */
.app{
  display:flex;
  flex-direction:column;
  height:100dvh;
  width:100%;
  position:relative;
}

/* PANELS */
.panel{
  display:none;
  flex-direction:column;
  flex:1;
  overflow:hidden;
  min-height:0;
}
.panel.active{display:flex;}

/* BOTTOM NAV */
.bottom-nav{
  display:flex;
  background:var(--surface);
  border-top:1px solid var(--border);
  flex-shrink:0;
  padding-bottom:var(--safe-bottom);
  z-index:100;
}
.nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  padding:10px 4px;
  background:none;
  border:none;
  color:var(--muted);
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  cursor:pointer;
  transition:color 0.15s;
  letter-spacing:0.05em;
}
.nav-btn .icon{font-size:20px;line-height:1;}
.nav-btn.active{color:var(--blue);}
.nav-btn.active .icon{filter:drop-shadow(0 0 6px rgba(59,130,246,0.6));}

/* ===== PANEL CALC ===== */
#panel-calc{background:var(--bg);}

.display{
  background:var(--surface);
  padding:16px 20px 14px;
  text-align:right;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  position:relative;
}
.display-hist-btn{
  position:absolute;
  top:10px;left:14px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--muted);
  font-size:11px;
  padding:4px 10px;
  cursor:pointer;
  font-family:'JetBrains Mono',monospace;
}
.display-expr{
  font-size:12px;
  color:var(--muted);
  min-height:16px;
  margin-bottom:4px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.display-val{
  font-size:48px;
  font-weight:300;
  color:var(--text);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  letter-spacing:-2px;
  line-height:1;
}
.display-val.sm{font-size:32px;letter-spacing:-1px;}
.display-val.xs{font-size:22px;letter-spacing:0;}

.mode-strip{
  display:flex;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:6px 10px;
  gap:6px;
  flex-shrink:0;
}
.mode-btn{
  flex:1;
  padding:6px;
  border:1px solid var(--border);
  border-radius:8px;
  background:none;
  color:var(--muted);
  font-size:11px;
  cursor:pointer;
  font-family:'JetBrains Mono',monospace;
  transition:all 0.12s;
}
.mode-btn.active{background:var(--surface3);color:var(--text);border-color:rgba(255,255,255,0.15);}

.keypad{
  flex:1;
  display:grid;
  padding:8px;
  gap:7px;
  min-height:0;
}
.keypad.standard{grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(5,1fr);}
.keypad.scientific{grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(6,1fr);}

.k{
  border:none;
  border-radius:14px;
  font-family:'JetBrains Mono',monospace;
  font-size:18px;
  font-weight:500;
  cursor:pointer;
  transition:transform 0.07s,filter 0.1s;
  border-bottom:3px solid rgba(0,0,0,0.3);
  color:var(--text);
  background:var(--surface2);
  touch-action:manipulation;
  user-select:none;
}
.k:active{transform:scale(0.91);filter:brightness(1.2);border-bottom-width:1px;}
.k.op{background:#1a2d4a;color:#60a5fa;}
.k.fn{background:#161e30;color:var(--muted);font-size:13px;}
.k.eq{background:var(--orange);color:#1a0800;font-weight:700;font-size:22px;}
.k.clr{background:#2a1218;color:var(--red);}
.k.span2{grid-column:span 2;}

/* HISTORY DRAWER */
.hist-drawer{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:200;
  pointer-events:none;
}
.hist-backdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
  opacity:0;
  transition:opacity 0.25s;
}
.hist-sheet{
  position:absolute;
  bottom:0;left:0;right:0;
  background:var(--surface);
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);
  max-height:65dvh;
  display:flex;
  flex-direction:column;
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
}
.hist-drawer.open{pointer-events:all;}
.hist-drawer.open .hist-backdrop{opacity:1;}
.hist-drawer.open .hist-sheet{transform:translateY(0);}
.hist-handle{width:36px;height:4px;background:var(--muted2);border-radius:2px;margin:12px auto 8px;}
.hist-head{display:flex;justify-content:space-between;align-items:center;padding:4px 16px 12px;flex-shrink:0;}
.hist-head-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--muted);}
.hist-clear{background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace;}
.hist-list{overflow-y:auto;padding:0 12px 20px;flex:1;}
.hist-item{padding:10px 12px;border-radius:10px;border:1px solid transparent;margin-bottom:6px;cursor:pointer;transition:all 0.12s;active:background:var(--surface2);}
.hist-item:active{background:var(--surface2);border-color:var(--border);}
.hist-expr{font-size:11px;color:var(--muted);margin-bottom:3px;}
.hist-res{font-size:20px;color:var(--text);}
.hist-empty{text-align:center;color:var(--muted2);font-size:12px;padding:30px 0;}

/* ===== PANEL CONV ===== */
#panel-conv{overflow-y:auto;padding:14px;gap:12px;background:var(--bg);}

.conv-cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;flex-shrink:0;}
.conv-cats::-webkit-scrollbar{display:none;}
.conv-cat-btn{
  white-space:nowrap;
  padding:7px 14px;
  border-radius:20px;
  border:1px solid var(--border);
  background:none;
  color:var(--muted);
  font-size:12px;
  cursor:pointer;
  font-family:'JetBrains Mono',monospace;
  transition:all 0.12s;
  flex-shrink:0;
}
.conv-cat-btn.active{background:var(--blue);border-color:var(--blue);color:white;}

.conv-cards{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.conv-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:16px;}
.conv-label{font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:0.08em;}
.conv-input{
  width:100%;
  background:none;
  border:none;
  color:var(--text);
  font-size:32px;
  font-family:'JetBrains Mono',monospace;
  outline:none;
  font-weight:300;
}
.conv-select{
  background:var(--surface3);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:13px;
  padding:7px 10px;
  font-family:'JetBrains Mono',monospace;
  outline:none;
  cursor:pointer;
  width:100%;
  margin-top:8px;
}
.conv-swap{
  display:flex;
  justify-content:center;
  margin:2px 0;
}
.conv-swap-btn{
  background:var(--surface3);
  border:1px solid var(--border);
  border-radius:50%;
  width:36px;height:36px;
  font-size:18px;
  color:var(--muted);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* ===== PANEL PCT ===== */
#panel-pct{overflow-y:auto;padding:14px;gap:10px;background:var(--bg);}

.pct-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:16px;}
.pct-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:12px;letter-spacing:0.1em;}
.pct-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.pct-inp{
  flex:1;
  background:var(--surface3);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-size:16px;
  font-family:'JetBrains Mono',monospace;
  padding:10px 12px;
  outline:none;
  min-width:0;
}
.pct-inp:focus{border-color:rgba(59,130,246,0.5);}
.pct-sep{font-size:13px;color:var(--muted);flex-shrink:0;}
.pct-result{
  background:var(--surface3);
  border-radius:10px;
  padding:12px 14px;
  margin-top:8px;
  font-size:24px;
  color:var(--text);
  text-align:center;
  font-weight:300;
}
.pct-result span{font-size:10px;color:var(--muted);display:block;margin-bottom:2px;letter-spacing:0.05em;}

/* ===== PANEL GRAPH ===== */
#panel-graph{padding:12px;gap:10px;background:var(--bg);}

.graph-top{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.graph-fn-row{display:flex;gap:8px;}
.graph-input{
  flex:1;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-size:14px;
  font-family:'JetBrains Mono',monospace;
  padding:10px 14px;
  outline:none;
}
.graph-input:focus{border-color:rgba(59,130,246,0.4);}
.graph-btn{
  padding:10px 16px;
  background:var(--blue);
  border:none;
  border-radius:10px;
  color:white;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  cursor:pointer;
  flex-shrink:0;
}
.graph-range-row{display:flex;gap:8px;align-items:center;font-size:11px;color:var(--muted);}
.graph-range-inp{
  width:52px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:7px;
  color:var(--text);
  font-size:12px;
  padding:6px 8px;
  font-family:'JetBrains Mono',monospace;
  outline:none;
}
.graph-error{color:var(--red);font-size:11px;min-height:14px;flex-shrink:0;}
.graph-examples{display:flex;gap:6px;overflow-x:auto;flex-shrink:0;}
.graph-examples::-webkit-scrollbar{display:none;}
.graph-ex-btn{
  white-space:nowrap;
  padding:5px 11px;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--muted);
  font-size:11px;
  cursor:pointer;
  font-family:'JetBrains Mono',monospace;
  flex-shrink:0;
}
canvas#graphCanvas{
  flex:1;
  border-radius:14px;
  background:var(--surface2);
  border:1px solid var(--border);
  min-height:0;
  width:100%;
  display:block;
}

/* scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
</style>
</head>
<body>
<div class="app">

  <!-- CALC -->
  <div class="panel active" id="panel-calc">
    <div class="display">
      <button class="display-hist-btn" onclick="toggleHist()">⏱ Historique</button>
      <div class="display-expr" id="expr"></div>
      <div class="display-val" id="display">0</div>
    </div>
    <div class="mode-strip">
      <button class="mode-btn active" id="mode-std" onclick="setMode('std')">Standard</button>
      <button class="mode-btn" id="mode-sci" onclick="setMode('sci')">Scientifique</button>
    </div>
    <div class="keypad standard" id="keypad"></div>
  </div>

  <!-- CONV -->
  <div class="panel" id="panel-conv">
    <div class="conv-cats" id="convCats"></div>
    <div class="conv-cards">
      <div class="conv-card">
        <div class="conv-label">DE</div>
        <input class="conv-input" id="convFrom" type="number" value="1" inputmode="decimal" oninput="convertVal()"/>
        <select class="conv-select" id="convUnitFrom" onchange="convertVal()"></select>
      </div>
      <div class="conv-swap">
        <button class="conv-swap-btn" onclick="swapConv()">⇅</button>
      </div>
      <div class="conv-card">
        <div class="conv-label">VERS</div>
        <input class="conv-input" id="convTo" type="number" readonly/>
        <select class="conv-select" id="convUnitTo" onchange="convertVal()"></select>
      </div>
    </div>
  </div>

  <!-- PCT -->
  <div class="panel" id="panel-pct">

    <div class="pct-card">
      <div class="pct-title">RÉDUCTION / SOLDE</div>
      <div class="pct-row">
        <input class="pct-inp" id="p1-price" type="number" inputmode="decimal" placeholder="Prix €" oninput="calcPct1()"/>
        <span class="pct-sep">−</span>
        <input class="pct-inp" id="p1-pct" type="number" inputmode="decimal" placeholder="%" style="max-width:80px" oninput="calcPct1()"/>
      </div>
      <div class="pct-result" id="p1-res"><span>RÉSULTAT</span>—</div>
    </div>

    <div class="pct-card">
      <div class="pct-title">TVA</div>
      <div class="pct-row">
        <input class="pct-inp" id="p2-ht" type="number" inputmode="decimal" placeholder="Prix HT €" oninput="calcTVA()"/>
        <span class="pct-sep">TVA</span>
        <input class="pct-inp" id="p2-tva" type="number" inputmode="decimal" placeholder="%" value="20" style="max-width:70px" oninput="calcTVA()"/>
      </div>
      <div class="pct-result" id="p2-res"><span>TTC</span>—</div>
    </div>

    <div class="pct-card">
      <div class="pct-title">POURBOIRE</div>
      <div class="pct-row">
        <input class="pct-inp" id="p3-bill" type="number" inputmode="decimal" placeholder="Addition €" oninput="calcTip()"/>
        <span class="pct-sep">×</span>
        <input class="pct-inp" id="p3-tip" type="number" inputmode="decimal" placeholder="%" value="15" style="max-width:70px" oninput="calcTip()"/>
      </div>
      <div class="pct-result" id="p3-res"><span>POURBOIRE + TOTAL</span>—</div>
    </div>

    <div class="pct-card">
      <div class="pct-title">VARIATION %</div>
      <div class="pct-row">
        <input class="pct-inp" id="p4-a" type="number" inputmode="decimal" placeholder="Avant" oninput="calcVar()"/>
        <span class="pct-sep">→</span>
        <input class="pct-inp" id="p4-b" type="number" inputmode="decimal" placeholder="Après" oninput="calcVar()"/>
      </div>
      <div class="pct-result" id="p4-res"><span>ÉVOLUTION</span>—</div>
    </div>

  </div>

  <!-- GRAPH -->
  <div class="panel" id="panel-graph">
    <div class="graph-top">
      <div class="graph-fn-row">
        <input class="graph-input" id="fnInput" type="text" placeholder="ex: Math.sin(x)*x" value="Math.sin(x)*x"/>
        <button class="graph-btn" onclick="drawGraph()">Tracer</button>
      </div>
      <div class="graph-range-row">
        x de <input class="graph-range-inp" id="gXmin" type="number" value="-10"/>
        à <input class="graph-range-inp" id="gXmax" type="number" value="10"/>
      </div>
      <div class="graph-examples" id="graphExamples"></div>
      <div class="graph-error" id="graphError"></div>
    </div>
    <canvas id="graphCanvas"></canvas>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="tab-calc" onclick="showPanel('calc')">
      <span class="icon">🔢</span>Calc
    </button>
    <button class="nav-btn" id="tab-conv" onclick="showPanel('conv')">
      <span class="icon">⇄</span>Convertir
    </button>
    <button class="nav-btn" id="tab-pct" onclick="showPanel('pct')">
      <span class="icon">%</span>Pourcent
    </button>
    <button class="nav-btn" id="tab-graph" onclick="showPanel('graph')">
      <span class="icon">📈</span>Graphe
    </button>
  </nav>

</div>

<!-- HISTORY DRAWER -->
<div class="hist-drawer" id="histDrawer">
  <div class="hist-backdrop" onclick="toggleHist()"></div>
  <div class="hist-sheet">
    <div class="hist-handle"></div>
    <div class="hist-head">
      <span class="hist-head-title">HISTORIQUE</span>
      <button class="hist-clear" onclick="clearHist()">Effacer tout</button>
    </div>
    <div class="hist-list" id="histList">
      <div class="hist-empty" id="histEmpty">Aucun calcul pour l'instant</div>
    </div>
  </div>
</div>

<script>
// ===== NAVIGATION =====
function showPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='graph') setTimeout(drawGraph,80);
}

// ===== HISTORY DRAWER =====
function toggleHist(){
  document.getElementById('histDrawer').classList.toggle('open');
}
function clearHist(){
  document.getElementById('histList').innerHTML='<div class="hist-empty" id="histEmpty">Aucun calcul pour l\'instant</div>';
}
function addHistory(ex,res){
  const list=document.getElementById('histList');
  const empty=document.getElementById('histEmpty');
  if(empty) empty.remove();
  const d=document.createElement('div');
  d.className='hist-item';
  d.innerHTML=`<div class="hist-expr">${ex}</div><div class="hist-res">${res}</div>`;
  d.onclick=()=>{ current=res; fresh=true; updateDisplay(current,''); toggleHist(); showPanel('calc'); };
  list.insertBefore(d, list.firstChild);
}

// ===== CALC =====
let current='0', expr='', op=null, prev=null, fresh=false, calcMode='std';

const stdKeys=[
  [{l:'C',c:'clr'},{l:'±'},{l:'%'},{l:'÷',c:'op'}],
  [{l:'7'},{l:'8'},{l:'9'},{l:'×',c:'op'}],
  [{l:'4'},{l:'5'},{l:'6'},{l:'−',c:'op'}],
  [{l:'1'},{l:'2'},{l:'3'},{l:'+',c:'op'}],
  [{l:'0',s:2},{l:'.'},{l:'=',c:'eq'}]
];
const sciKeys=[
  [{l:'C',c:'clr'},{l:'±'},{l:'%'},{l:'(',c:'op'},{l:')',c:'op'}],
  [{l:'sin',c:'fn'},{l:'cos',c:'fn'},{l:'tan',c:'fn'},{l:'√',c:'fn'},{l:'÷',c:'op'}],
  [{l:'log',c:'fn'},{l:'ln',c:'fn'},{l:'x²',c:'fn'},{l:'xʸ',c:'fn'},{l:'×',c:'op'}],
  [{l:'7'},{l:'8'},{l:'9'},{l:'π',c:'fn'},{l:'−',c:'op'}],
  [{l:'4'},{l:'5'},{l:'6'},{l:'e',c:'fn'},{l:'+',c:'op'}],
  [{l:'1'},{l:'2'},{l:'3'},{l:'.'},{l:'=',c:'eq'}],
];

function buildKeypad(){
  const kp=document.getElementById('keypad');
  kp.innerHTML='';
  const keys=calcMode==='std'?stdKeys:sciKeys;
  kp.className='keypad '+(calcMode==='std'?'standard':'scientific');
  keys.forEach(row=>{
    row.forEach(key=>{
      const b=document.createElement('button');
      b.textContent=key.l;
      b.className='k '+(key.c||'');
      if(key.s) b.style.gridColumn='span '+key.s;
      b.addEventListener('click',()=>pressCalc(key.l));
      kp.appendChild(b);
    });
  });
}

function setMode(m){
  calcMode=m;
  document.getElementById('mode-std').classList.toggle('active',m==='std');
  document.getElementById('mode-sci').classList.toggle('active',m==='sci');
  buildKeypad();
}

function updateDisplay(val,ex){
  const d=document.getElementById('display');
  const shown=val.length>14?parseFloat(val).toExponential(5):val;
  d.textContent=shown;
  d.className='display-val'+(shown.length>12?' xs':shown.length>8?' sm':'');
  document.getElementById('expr').textContent=ex||'';
}

function pressCalc(k){
  if(k==='='){
    if(current==='36535'&&!op){ window.location.href='https://www.google.com'; return; }
    if(op&&prev!==null){
      const b=parseFloat(current); let res;
      if(op==='÷') res=b===0?'Erreur':prev/b;
      else if(op==='×') res=prev*b;
      else if(op==='−') res=prev-b;
      else if(op==='+') res=prev+b;
      else if(op==='xʸ') res=Math.pow(prev,b);
      const exStr=prev+' '+op+' '+b+' =';
      current=res==='Erreur'?'Erreur':parseFloat(res.toFixed(10)).toString();
      addHistory(exStr,current);
      expr=exStr; op=null; prev=null; fresh=true;
      updateDisplay(current,expr); return;
    }
    expr=current+' ='; updateDisplay(current,expr); fresh=true; return;
  }
  if(k==='C'){ current='0';expr='';op=null;prev=null;fresh=false;updateDisplay('0','');return;}
  if(k==='±'){ if(current!=='Erreur') current=(parseFloat(current)*-1).toString(); updateDisplay(current,expr);return;}
  if(k==='%'){ if(current!=='Erreur') current=(parseFloat(current)/100).toString(); updateDisplay(current,expr);return;}
  if(['÷','×','−','+','xʸ'].includes(k)){
    prev=parseFloat(current); op=k; expr=current+' '+k; fresh=true; updateDisplay(current,expr);return;
  }
  const sci={
    'sin':v=>Math.sin(v*Math.PI/180),
    'cos':v=>Math.cos(v*Math.PI/180),
    'tan':v=>Math.tan(v*Math.PI/180),
    '√':v=>Math.sqrt(v),
    'log':v=>Math.log10(v),
    'ln':v=>Math.log(v),
    'x²':v=>v*v,
  };
  if(sci[k]){
    const res=sci[k](parseFloat(current));
    const exStr=k+'('+current+')';
    current=parseFloat(res.toFixed(10)).toString();
    addHistory(exStr,current); expr=exStr; fresh=true; updateDisplay(current,expr); return;
  }
  if(k==='π'){ current=Math.PI.toString(); updateDisplay(current,expr); fresh=false; return;}
  if(k==='e'){ current=Math.E.toString(); updateDisplay(current,expr); fresh=false; return;}
  if(k==='('||k===')') return;
  if(k==='.'){
    if(fresh){current='0.';fresh=false;}
    else if(!current.includes('.'))current+='.';
    updateDisplay(current,expr);return;
  }
  if(fresh||current==='Erreur'){current=k;fresh=false;}
  else{current=current==='0'?k:current+k;}
  updateDisplay(current,expr);
}

// ===== CONVERTISSEUR =====
const convData={
  'Longueur':{units:['m','km','cm','mm','mi','ft','in'],toBase:{m:1,km:1000,cm:0.01,mm:0.001,mi:1609.344,ft:0.3048,in:0.0254}},
  'Masse':{units:['kg','g','mg','lb','oz','t'],toBase:{kg:1,g:0.001,mg:0.000001,lb:0.453592,oz:0.028349,t:1000}},
  'Temp.':{units:['°C','°F','K'],toBase:null},
  'Vitesse':{units:['km/h','m/s','mph','nœud'],toBase:{'km/h':1/3.6,'m/s':1,'mph':0.44704,'nœud':0.514444}},
  'Surface':{units:['m²','km²','cm²','ha','acre'],toBase:{'m²':1,'km²':1e6,'cm²':0.0001,'ha':10000,'acre':4046.86}},
  'Volume':{units:['L','mL','m³','gal','pt'],toBase:{L:0.001,mL:0.000001,'m³':1,'gal':0.003785,'pt':0.000473}},
  'Monnaie':{units:['EUR','USD','GBP','JPY','CHF','CAD'],toBase:{EUR:1,USD:0.92,GBP:1.17,JPY:0.0062,CHF:1.04,CAD:0.68}},
  'Données':{units:['B','KB','MB','GB','TB'],toBase:{B:1,KB:1024,MB:1048576,GB:1073741824,TB:1099511627776}}
};
let convCat='Longueur';
function buildConvCats(){
  const el=document.getElementById('convCats');
  el.innerHTML='';
  Object.keys(convData).forEach(c=>{
    const b=document.createElement('button');
    b.className='conv-cat-btn'+(c===convCat?' active':'');
    b.textContent=c;
    b.onclick=()=>{convCat=c;buildConvCats();buildConvUnits();convertVal();};
    el.appendChild(b);
  });
}
function buildConvUnits(){
  const data=convData[convCat];
  ['convUnitFrom','convUnitTo'].forEach((id,i)=>{
    const sel=document.getElementById(id);
    sel.innerHTML='';
    data.units.forEach((u,j)=>{
      const o=document.createElement('option');
      o.value=u;o.textContent=u;
      if(i===0&&j===0) o.selected=true;
      if(i===1&&j===1) o.selected=true;
      sel.appendChild(o);
    });
  });
}
function convertVal(){
  const from=document.getElementById('convUnitFrom').value;
  const to=document.getElementById('convUnitTo').value;
  const val=parseFloat(document.getElementById('convFrom').value)||0;
  const data=convData[convCat];
  let result;
  if(convCat==='Temp.'){
    let c;
    if(from==='°C') c=val;
    else if(from==='°F') c=(val-32)*5/9;
    else c=val-273.15;
    if(to==='°C') result=c;
    else if(to==='°F') result=c*9/5+32;
    else result=c+273.15;
  } else {
    result=val*data.toBase[from]/data.toBase[to];
  }
  document.getElementById('convTo').value=parseFloat(result.toFixed(6));
}
function swapConv(){
  const sf=document.getElementById('convUnitFrom');
  const st=document.getElementById('convUnitTo');
  const tmp=sf.value; sf.value=st.value; st.value=tmp;
  convertVal();
}
buildConvCats(); buildConvUnits(); convertVal();

// ===== POURCENTAGES =====
function calcPct1(){
  const price=parseFloat(document.getElementById('p1-price').value);
  const pct=parseFloat(document.getElementById('p1-pct').value);
  if(isNaN(price)||isNaN(pct)){document.getElementById('p1-res').innerHTML='<span>RÉSULTAT</span>—';return;}
  const disc=price*pct/100;
  document.getElementById('p1-res').innerHTML=`<span>Économie : ${disc.toFixed(2)} €</span>${(price-disc).toFixed(2)} €`;
}
function calcTVA(){
  const ht=parseFloat(document.getElementById('p2-ht').value);
  const tva=parseFloat(document.getElementById('p2-tva').value)||20;
  if(isNaN(ht)){document.getElementById('p2-res').innerHTML='<span>TTC</span>—';return;}
  const ttc=ht*(1+tva/100);
  document.getElementById('p2-res').innerHTML=`<span>TVA : ${(ttc-ht).toFixed(2)} €</span>${ttc.toFixed(2)} €`;
}
function calcTip(){
  const bill=parseFloat(document.getElementById('p3-bill').value);
  const tip=parseFloat(document.getElementById('p3-tip').value)||15;
  if(isNaN(bill)){document.getElementById('p3-res').innerHTML='<span>POURBOIRE + TOTAL</span>—';return;}
  const t=bill*tip/100;
  document.getElementById('p3-res').innerHTML=`<span>Pourboire : ${t.toFixed(2)} €</span>${(bill+t).toFixed(2)} €`;
}
function calcVar(){
  const a=parseFloat(document.getElementById('p4-a').value);
  const b=parseFloat(document.getElementById('p4-b').value);
  if(isNaN(a)||isNaN(b)||a===0){document.getElementById('p4-res').innerHTML='<span>ÉVOLUTION</span>—';return;}
  const v=((b-a)/Math.abs(a))*100;
  document.getElementById('p4-res').innerHTML=`<span>Variation</span>${v>=0?'+':''}${v.toFixed(2)} %`;
}

// ===== GRAPHE =====
const examples=[
  {l:'sin(x)',v:'Math.sin(x)'},
  {l:'x²',v:'x*x'},
  {l:'|x|',v:'Math.abs(x)'},
  {l:'ln(x)',v:'Math.log(x)'},
  {l:'x³−x',v:'x*x*x - x'},
];
(function(){
  const el=document.getElementById('graphExamples');
  examples.forEach(ex=>{
    const b=document.createElement('button');
    b.className='graph-ex-btn';
    b.textContent=ex.l;
    b.onclick=()=>{document.getElementById('fnInput').value=ex.v;drawGraph();};
    el.appendChild(b);
  });
})();

function drawGraph(){
  const canvas=document.getElementById('graphCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetHeight;
  const W=canvas.width, H=canvas.height;
  if(!W||!H) return;
  const xmin=parseFloat(document.getElementById('gXmin').value)||(-10);
  const xmax=parseFloat(document.getElementById('gXmax').value)||10;
  const fnStr=document.getElementById('fnInput').value;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#111827'; ctx.fillRect(0,0,W,H);
  document.getElementById('graphError').textContent='';
  let fn;
  try{ fn=new Function('x','Math',`return ${fnStr}`); fn(0,Math); }
  catch(e){ document.getElementById('graphError').textContent='Erreur: '+e.message; return; }
  const steps=W*2;
  const xVals=[],yVals=[];
  for(let i=0;i<=steps;i++){
    const x=xmin+(xmax-xmin)*i/steps;
    let y; try{ y=fn(x,Math); }catch{ y=NaN; }
    xVals.push(x); yVals.push(isFinite(y)?y:NaN);
  }
  const validY=yVals.filter(v=>!isNaN(v));
  if(!validY.length) return;
  let ymin=Math.min(...validY),ymax=Math.max(...validY);
  if(ymin===ymax){ymin-=1;ymax+=1;}
  const pad=(ymax-ymin)*0.1; ymin-=pad; ymax+=pad;
  const toX=x=>(x-xmin)/(xmax-xmin)*W;
  const toY=y=>H-(y-ymin)/(ymax-ymin)*H;
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  for(let x=Math.ceil(xmin);x<=Math.floor(xmax);x++){const cx=toX(x);ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();}
  for(let y=Math.ceil(ymin);y<=Math.floor(ymax);y++){const cy=toY(y);ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();}
  // axes
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
  const ox=toX(0),oy=toY(0);
  if(ox>=0&&ox<=W){ctx.beginPath();ctx.moveTo(ox,0);ctx.lineTo(ox,H);ctx.stroke();}
  if(oy>=0&&oy<=H){ctx.beginPath();ctx.moveTo(0,oy);ctx.lineTo(W,oy);ctx.stroke();}
  // labels
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='10px JetBrains Mono,monospace';
  ctx.textAlign='center';
  const xStep=Math.max(1,Math.round((xmax-xmin)/8));
  for(let x=Math.ceil(xmin);x<=Math.floor(xmax);x+=xStep){
    if(Math.abs(x)<0.001) continue;
    ctx.fillText(x,toX(x),Math.min(H-4,Math.max(12,(oy||H/2)+12)));
  }
  // curve
  const grad=ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'#3b82f6'); grad.addColorStop(0.5,'#8b5cf6'); grad.addColorStop(1,'#06b6d4');
  ctx.strokeStyle=grad; ctx.lineWidth=2.5; ctx.lineJoin='round';
  ctx.beginPath(); let started=false;
  for(let i=0;i<=steps;i++){
    const y=yVals[i];
    if(isNaN(y)){started=false;continue;}
    const cx=toX(xVals[i]),cy=toY(y);
    if(!started){ctx.moveTo(cx,cy);started=true;}else ctx.lineTo(cx,cy);
  }
  ctx.stroke();
  // glow
  ctx.strokeStyle='rgba(139,92,246,0.12)'; ctx.lineWidth=10;
  ctx.beginPath(); started=false;
  for(let i=0;i<=steps;i++){
    const y=yVals[i];
    if(isNaN(y)){started=false;continue;}
    const cx=toX(xVals[i]),cy=toY(y);
    if(!started){ctx.moveTo(cx,cy);started=true;}else ctx.lineTo(cx,cy);
  }
  ctx.stroke();
}
window.addEventListener('resize',()=>{if(document.getElementById('panel-graph').classList.contains('active'))drawGraph();});
</script>
